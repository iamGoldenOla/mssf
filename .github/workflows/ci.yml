name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write # Required for pushing build output to the build branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Bun Environment
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Run Linting
        run: bun run lint
        continue-on-error: true

      - name: Build Application
        run: bun run build

      # Deploy compiled dist folder to 'build' branch on GitHub
      - name: 🚀 Push Build to Branch
        uses: JamesIves/github-pages-deploy-action@v4.5.0
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: build
          folder: dist

      # Trigger cPanel Auto-Deployment via HTTPS Webhook call
      - name: 🔔 Trigger cPanel Auto-Deploy Hook
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          curl -sS "https://mssf.com.ng/deploy.php?key=mssf_deploy_key_2026"


